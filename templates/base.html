<!DOCTYPE html>
<html lang="en">
<head>

  <title>{% block title %}{{ profile.name }} — {{ profile.role }}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <div class="container">

    <nav class="nav">
      <a href="{{ url_for('home') }}" class="nav-logo"><h1>Thobelani Zulu</h1></span></a>

        <a href="{{ url_for('home') }}">home</a>

        <a href="{{ url_for('education') }}">education</a>

    <footer>
      <span>&copy; 2026 {{ profile.name }}</span>

  </div>
